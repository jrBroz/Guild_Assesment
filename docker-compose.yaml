version: '3.8'

services:
  # 1. Banco de Dados PostgreSQL
  db:
    image: leogloriainfnet/postgres-tp2-spring:2.0-mac
    container_name: postgres-tp2-db
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=123456
      - POSTGRES_DB=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data


volumes:
  postgres_data: